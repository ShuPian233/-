<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>服务协议与隐私政策</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: #f7f7f7;
            overflow: hidden;
        }

        /* 初始隐私协议弹窗 */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(0, 0, 0, 0.4);
            z-index: 1000;
        }

        .privacy-dialog {
            width: 85%;
            max-width: 400px;
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .dialog-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            text-align: center;
        }

        .dialog-content {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 20px;
            max-height: 200px;
            overflow-y: auto;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .dialog-footer {
            display: flex;
            justify-content: center;
        }

        .btn-agree {
            width: 100%;
            height: 44px;
            border-radius: 22px;
            border: none;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            background-color: #07c160;
            color: white;
            transition: opacity 0.2s;
        }

        .btn-agree:active {
            opacity: 0.8;
        }

        /* 全屏视频容器 (初始隐藏) */
        .scare-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: black;
            z-index: 10;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hidden {
            display: none !important;
        }

        /* 伪造的摄像头权限弹窗 */
        .cam-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 2000;
        }

        .cam-dialog {
            width: 80%;
            max-width: 320px;
            background: white;
            border-radius: 14px;
            overflow: hidden;
            animation: fadeInUp 0.2s ease;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .cam-header {
            padding: 16px 16px 0 16px;
            font-size: 18px;
            font-weight: 600;
            color: #333;
            text-align: center;
        }

        .cam-body {
            padding: 16px;
            font-size: 14px;
            color: #555;
            text-align: center;
            line-height: 1.5;
        }

        .cam-footer {
            display: flex;
            border-top: 1px solid #e5e5e5;
        }

        .cam-footer button {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
        }

        .cam-footer .btn-allow {
            color: #07c160;
            border-left: 1px solid #e5e5e5;
        }

        .cam-footer .btn-deny {
            color: #888;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <!-- 隐私协议弹窗 -->
    <div id="privacyOverlay" class="overlay">
        <div class="privacy-dialog">
            <div class="dialog-title">个人信息保护指引</div>
            <div class="dialog-content">
                为了加强对个人信息的保护，根据相关法律法规，我们需要向您说明处理个人信息的情况。
                我们会根据您的授权来收集和使用信息，包括为您提供基础展示服务、优化用户体验以及保障账号安全。
            </div>
            <div class="dialog-footer">
                <button class="btn-agree" id="startBtn">同意并继续</button>
            </div>
        </div>
    </div>

    <!-- 全屏视频容器（整蛊视频） -->
    <div id="videoWrap" class="scare-container hidden">
        <video id="scareVideo" src="never.mp4" loop playsinline></video>
    </div>
